# Currently placeholder - requires manual data download
model_name_or_path: ./cache/qwen2
trust_remote_code: true
stage: dpo
do_train: true
finetuning_type: lora
template: qwen
dataset: ultramedical_paired
dataset_dir: src/data
cutoff_len: 1024
max_samples: null
