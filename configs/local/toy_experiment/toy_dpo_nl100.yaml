# Toy Experiment: DPO n_L=100 (Table 6, 7)
# Paper Table 7: lr=1e-3, epochs=10, batch=16(total)
model_name_or_path: ./cache/mistralai/Mistral-7B-Instruct-v0.2
trust_remote_code: true
stage: dpo
do_train: true
finetuning_type: lora
template: default
dataset: toy_paired_nl100
dataset_dir: src/data
cutoff_len: 512
max_samples: 100
overwrite_cache: false
preprocessing_num_workers: 4
num_train_epochs: 10
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-3
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_grad_norm: 1.0
lora_rank: 8
lora_target: all
val_size: 0.0
per_device_eval_batch_size: 2
eval_strategy: 'no'
logging_steps: 20
save_steps: 200
plot_loss: true
overwrite_output_dir: true
bf16: true
cache_dir: ./cache
output_dir: ./saves/toy/dpo/nl100
pref_loss: sigmoid
pref_beta: 0.1
report_to: none
