# Toy SSPO n_L=50, noise=50%
# Paper Table 7: lr=1e-3, decay=0.001
model_name_or_path: ./cache/mistralai/Mistral-7B-Instruct-v0.2
trust_remote_code: true
stage: dpo
do_train: true
finetuning_type: lora
template: default
dataset: toy_paired_nl50_noise50
dataset_dir: src/data
cutoff_len: 512
max_samples: 50
overwrite_cache: false
preprocessing_num_workers: 4
num_train_epochs: 10
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1e-3
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_grad_norm: 1.0
lora_rank: 8
lora_target: all
val_size: 0.0
per_device_eval_batch_size: 2
eval_strategy: 'no'
logging_steps: 20
save_steps: 200
plot_loss: true
overwrite_output_dir: true
bf16: true
cache_dir: ./cache
output_dir: ./saves/toy/sspo/nl50_noise50
pref_loss: sspo
pref_beta: 10.0
sspo_gamma_0: 1.0
sspo_gamma_min: 0.22
sspo_gamma_decay: 0.001
sspo_prior: 0.5
report_to: none
